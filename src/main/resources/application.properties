spring.application.name=json-order-service
server.port=8084

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.datasource.hikari.auto-commit=true
spring.jpa.properties.hibernate.connection.provider_disables_autocommit=false

service.auth.url=${AUTH_SERVICE_URL:http://localhost:8081}
service.wallet.url=${WALLET_SERVICE_URL:http://localhost:8082}
service.inventory.url=${INVENTORY_SERVICE_URL:http://localhost:8083}